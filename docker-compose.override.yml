# Auto-loaded by `docker compose` — bind-mounts host-compiled binaries
# into runtime containers so code changes only require `cargo build`
# + container restart (no image rebuild).
#
# Workflow:
#   cargo build                          # compile locally (~5s incremental)
#   docker compose restart strata-sender-sim   # pick up new binaries

services:
  strata-control:
    # Run host-compiled control binary instead of the one baked into the image.
    volumes:
      - ./target/debug/strata-control:/usr/local/bin/strata-control:ro
      # Dashboard WASM is still served from the image's baked copy.
      # Use `dashboard-dev` (profile web-dev) for live-reload during UI work.

  strata-sender-sim:
    environment:
      RUST_LOG: "info,strata_sender=debug,strata::cc=debug,strata::transport=debug,strata::adapt=debug,strata::sink=debug,strata::runtime=debug,strata::scheduler=debug"
    volumes:
      # Sender daemon binary
      - ./target/debug/strata-sender:/usr/local/bin/strata-sender:ro
      # Pipeline binary (strata-pipeline sender)
      - ./target/debug/strata-pipeline:/usr/local/bin/strata-pipeline:ro
      # GStreamer bonding plugin
      - ./target/debug/libgststrata.so:/usr/lib/x86_64-linux-gnu/gstreamer-1.0/libgststrata.so:ro
      # Portal WASM app (locally built)
      - ./crates/strata-portal/dist:/app/portal:ro

  strata-receiver:
    volumes:
      # Receiver daemon binary
      - ./target/debug/strata-receiver:/usr/local/bin/strata-receiver:ro
      # Pipeline binary (strata-pipeline receiver, spawned by daemon)
      - ./target/debug/strata-pipeline:/usr/local/bin/strata-pipeline:ro
      # GStreamer bonding plugin (stratasrc element)
      - ./target/debug/libgststrata.so:/usr/lib/x86_64-linux-gnu/gstreamer-1.0/libgststrata.so:ro
